apiVersion: apps/v1
kind: Deployment
metadata:
  name: cica-case-review-documents-deployment
  labels:
    app: cica-case-review-documents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cica-case-review-documents
  template:
    metadata:
      labels:
        app: cica-case-review-documents
    spec:
      containers:
        - name: cica-case-review-documents
          image: cica-review-case-documents:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: APP_COOKIE_NAME
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: app_cookie_name
            - name: APP_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: app_cookie_secret
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: app_jwt_secret
            - name: APP_API_JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: app_api_jwt_issuer
            - name: APP_API_JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: app_api_jwt_audience
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: entra_client_id
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: entra_client_secret
            - name: ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: cica-case-review-documents-secrets
                  key: entra_tenant_id
            - name: APP_SEARCH_PAGINATION_ITEMS_PER_PAGE
              value: "5"
            - name: APP_DOCUMENT_PAGINATION_ITEMS_PER_PAGE
              value: "1"
            - name: APP_API_URL
              value: http://localhost:5000/api
            - name: APP_BASE_URL
              value: http://localhost:5000
            - name: APP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cica-review-case-documents-opensearch-proxy-url
                  key: proxy_url
            - name: OPENSEARCH_INDEX_CHUNKS_NAME
              value: page_chunks
            - name: NODE_ENV
              value: "production"
            - name: APP_ENTRA_RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: APP_ENTRA_RATE_LIMIT_MAX_LOGIN
              value: "20"
            - name: APP_ENTRA_RATE_LIMIT_MAX_CALLBACK
              value: "40"
          # Added for debugging purposes
        - name: debug
          image: nicolaka/netshoot
          command: ["sleep", "infinity"]
